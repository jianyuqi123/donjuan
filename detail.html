<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>歌曲播放</title>

    <link
        rel="stylesheet"
        href="style.css"
    >
</head>

<body class="player-page">

    <!-- 返回栏 -->
    <div class="back-bar">
        <button
            class="back-btn"
            id="backBtn"
        >
            ← 返回
        </button>
    </div>

    <div class="detail-wrap">

        <!-- 左侧播放器 -->
        <div class="detail-left">

            <div class="player-cover">
                <img
                    id="song-cover"
                    src="picture/zhanweifu.png"
                    alt="歌曲封面"
                >
            </div>

            <div class="player-controls">

                <div class="progress-bar">
                    <div
                        class="progress-fill"
                        id="progress"
                    ></div>
                </div>

                <div class="control-row">

                    <span id="cur">
                        00:00
                    </span>

                    <button
                        id="playBtn"
                        class="play-toggle"
                    >
                        ▶
                    </button>

                    <span id="dur">
                        00:00
                    </span>

                </div>
            </div>

        </div>

        <!-- 右侧详情 -->
        <div class="detail-right">

            <div class="tab-buttons">

                <button
                    class="tab-btn active"
                    onclick="switchTabDetail('lyrics')"
                >
                    歌词
                </button>

                <button
                    class="tab-btn"
                    onclick="switchTabDetail('info')"
                >
                    歌曲信息
                </button>

                <button
                    class="tab-btn"
                    onclick="switchTabDetail('note')"
                >
                    创作手记
                </button>

            </div>

            <!-- 歌词 -->
            <div
                id="tab-lyrics"
                class="tab-content active"
            >
                <div
                    class="lyrics-box"
                    id="lyrics-content"
                ></div>
            </div>

            <!-- 信息 -->
            <div
                id="tab-info"
                class="tab-content"
            >

                <div class="info-box">

                    <p>
                        <strong>歌曲名称：</strong>
                        <span id="song-title"></span>
                    </p>

                    <p>
                        <strong>歌手：</strong>
                        唐璜 DonJuan
                    </p>

                    <p>
                        <strong>时长：</strong>
                        <span id="song-duration"></span>
                    </p>

                    <p>
                        <strong>信息：</strong>
                        <span id="song-info"></span>
                    </p>

                </div>

            </div>

            <!-- 创作手记 -->
            <div
                id="tab-note"
                class="tab-content"
            >
                <div
                    class="note-box"
                    id="song-note"
                ></div>
            </div>

        </div>
    </div>

    <!-- 音频 -->
    <audio id="audio"></audio>

    <!-- 数据 -->
    <script src="js/playlist.js"></script>
    <script src="js/lyrics.js"></script>

    <!-- 主脚本 -->
    <script src="script.js"></script>

    <script>

        const urlParams =
            new URLSearchParams(
                location.search
            );

        const title =
            urlParams.get('title');

        const songId =
            urlParams.get('song');

        const from =
            urlParams.get('from');

        const albumId =
            urlParams.get('album');

        let matchedLyrics = null;
        let currentSong = null;

        // =================================
        // 读取歌曲数据
        // =================================

        if (title) {

            matchedLyrics =
                window.lyricsData.find(
                    item =>
                        item.title === title
                );
        }

        if (
            !matchedLyrics &&
            songId &&
            typeof songs !==
                'undefined'
        ) {

            currentSong =
                songs[songId];

            if (currentSong) {

                matchedLyrics =
                    window.lyricsData.find(
                        item =>
                            item.title ===
                            currentSong.title
                    );
            }
        }

        // =================================
        // 歌词渲染
        // =================================

        if (matchedLyrics) {

            document
                .getElementById(
                    'song-title'
                )
                .innerText =
                matchedLyrics.title;

            document
                .getElementById(
                    'lyrics-content'
                )
                .innerText =
                matchedLyrics.lyrics ||
                '暂无歌词';

            document
                .getElementById(
                    'song-info'
                )
                .innerText =
                matchedLyrics.info ||
                '暂无信息';

            document
                .getElementById(
                    'song-note'
                )
                .innerText =
                matchedLyrics.note ||
                '暂无创作手记';
        }
        else {

            document
                .getElementById(
                    'song-title'
                )
                .innerText =
                title || '未知歌曲';

            document
                .getElementById(
                    'lyrics-content'
                )
                .innerText =
                '暂无歌词';
        }

        // =================================
        // 播放器
        // =================================

        if (
            !currentSong &&
            songId &&
            typeof songs !==
                'undefined'
        ) {

            currentSong =
                songs[songId];
        }

        const audio =
            document.getElementById(
                'audio'
            );

        const playBtn =
            document.getElementById(
                'playBtn'
            );

        const progress =
            document.getElementById(
                'progress'
            );

        const cur =
            document.getElementById(
                'cur'
            );

        const dur =
            document.getElementById(
                'dur'
            );

        if (currentSong) {

            document
                .getElementById(
                    'song-cover'
                )
                .src =
                currentSong.cover ||
                'picture/zhanweifu.png';

            document
                .getElementById(
                    'song-duration'
                )
                .innerText =
                currentSong.duration ||
                '00:00';

            if (
                currentSong.audio
            ) {

                audio.src =
                    currentSong.audio;
            }
        }

        function fmt(t) {

            if (isNaN(t))
                return '00:00';

            const m =
                String(
                    Math.floor(
                        t / 60
                    )
                ).padStart(2,'0');

            const s =
                String(
                    Math.floor(
                        t % 60
                    )
                ).padStart(2,'0');

            return `${m}:${s}`;
        }

        audio.onloadedmetadata =
            () => {

                dur.innerText =
                    fmt(
                        audio.duration
                    );
            };

        audio.ontimeupdate =
            () => {

                cur.innerText =
                    fmt(
                        audio.currentTime
                    );

                if (
                    audio.duration
                ) {

                    progress.style.width =
                        `${
                            (
                                audio.currentTime
                                /
                                audio.duration
                            ) * 100
                        }%`;
                }
            };

        playBtn.onclick =
            () => {

                if (
                    audio.paused
                ) {

                    audio.play();

                    playBtn.innerText =
                        '⏸';
                }
                else {

                    audio.pause();

                    playBtn.innerText =
                        '▶';
                }
            };

        // =================================
        // 返回逻辑
        // =================================

        document
            .getElementById(
                'backBtn'
            )
            .onclick =
            () => {

                if (
                    from ===
                    'playlist'
                ) {

                    location.href =
                        'index.html#playlist';

                    return;
                }

                if (
                    from ===
                    'album'
                    &&
                    albumId
                ) {

                    location.href =
                        `index.html#album-detail=${albumId}`;

                    return;
                }

                location.href =
                    'index.html';
            };

        // =================================
        // 标签切换
        // =================================

        function
        switchTabDetail(
            tab
        ) {

            document
                .querySelectorAll(
                    '.tab-content'
                )
                .forEach(
                    el =>
                        el.classList
                        .remove(
                            'active'
                        )
                );

            document
                .querySelectorAll(
                    '.tab-btn'
                )
                .forEach(
                    el =>
                        el.classList
                        .remove(
                            'active'
                        )
                );

            document
                .getElementById(
                    `tab-${tab}`
                )
                .classList
                .add(
                    'active'
                );

            const idx =
                [
                    'lyrics',
                    'info',
                    'note'
                ].indexOf(tab);

            if (
                idx >= 0
            ) {

                document
                    .querySelectorAll(
                        '.tab-btn'
                    )
                    [idx]
                    .classList
                    .add(
                        'active'
                    );
            }
        }

    </script>

</body>
</html>
