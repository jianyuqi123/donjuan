<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
>

<title>歌曲详情</title>

<script>
if (localStorage.getItem("donjuan-theme") === "light") {
    document.documentElement.classList.add("theme-light-preload");
}
</script>

<link
    rel="stylesheet"
    href="style.css"
>
</head>

<body class="player-page detail-booting">

<!-- 返回栏 -->
<div class="back-bar">

    <button
        class="back-btn"
        id="backBtn"
    >
        ← 返回
    </button>

    <button
        class="mini-btn"
        id="miniBtn"
    >
        ─
    </button>

</div>

<iframe
    id="siteFrame"
    class="site-frame"
    title="唐璜 DonJuan"
    src="index.html#page-playlist"
></iframe>

<!-- 歌曲信息 -->
<div
    class="detail-wrap"
    id="detailWrap"
>

    <div class="detail-left">

        <div class="player-cover">

            <img
                id="song-cover"
                src="picture/zhanweifu.png"
                alt="cover"
            >

        </div>

        <div class="player-controls">

            <div class="progress-bar">

                <div
                    class="progress-fill"
                    id="progress"
                ></div>

            </div>

            <div class="control-row">

                <span id="cur">
                    00:00
                </span>

                <button
                    id="playBtn"
                    class="play-toggle"
                >
                    ▶
                </button>

                <span id="dur">
                    00:00
                </span>

            </div>

        </div>

    </div>

    <!-- 右侧 -->
    <div class="detail-right">

        <div class="tab-buttons">

            <button
                class="tab-btn active"
                onclick="switchTabDetail('lyrics')"
            >
                歌词
            </button>

            <button
                class="tab-btn"
                onclick="switchTabDetail('info')"
            >
                credits
            </button>

            <button
                class="tab-btn"
                onclick="switchTabDetail('note')"
            >
                创作手记
            </button>

        </div>

        <!-- 歌词 -->
        <div
            id="tab-lyrics"
            class="tab-content active"
        >

            <div
                class="lyrics-box"
                id="lyrics-content"
            ></div>

        </div>

        <!-- 信息 -->
        <div
            id="tab-info"
            class="tab-content"
        >

            <div class="info-box">

                <p>
                    <strong>歌曲：</strong>
                    <span id="song-title"></span>
                </p>

                <p>
                    <strong>歌手：</strong>
                    唐璜 DonJuan
                </p>

                <p>
                    <strong>时长：</strong>
                    <span id="song-duration"></span>
                </p>

                <p>
                    <strong>信息：</strong>
                    <span id="song-info"></span>
                </p>

            </div>

        </div>

        <!-- 手记 -->
        <div
            id="tab-note"
            class="tab-content"
        >

            <div
                id="song-note"
                class="note-box"
            ></div>

        </div>

    </div>

</div>

<!-- bottom player -->
<div
    class="mini-player"
    id="miniPlayer"
>

    <button
        id="miniPlayBtn"
        class="mini-play-btn"
    >
        ▶
    </button>

    <div class="mini-song-info">

        <div id="miniSongTitle">
            未播放
        </div>

        <span
            id="miniReleaseBadge"
            class="release-badge inline"
            aria-label="发行状态"
        >
        </span>

        <div class="mini-progress">

            <div
                id="miniProgress"
                class="mini-progress-fill"
            ></div>

        </div>

    </div>

    <button
        id="restorePlayerBtn"
        class="mini-restore-btn"
        type="button"
    >
        歌曲页
    </button>

</div>

<audio id="audio"></audio>

<!-- 数据 -->
<script src="js/playlist.js"></script>
<script src="js/other.js"></script>
<script src="js/lyrics.js"></script>
<script src="js/album.js"></script>
<script src="js/released.js"></script>
<script src="js/theme.js"></script>

<script>

/* ==========================
   参数
========================== */

const params =
    new URLSearchParams(
        location.search
    );

const title =
    params.get("title");

/* ==========================
   数据读取
========================== */

let currentSong =
    [
        ...(window.playlist || []),
        ...(window.otherSongs || [])
    ].find(
        item =>
            item.title === title
    );

let lyric =
    window.lyricsData?.find(
        item =>
            item.title === title
    );

const DEFAULT_COVER =
    "picture/zhanweifu.png";

const TEST_AUDIO =
    "music/summer.mp3";

function getCoverPath(cover) {

    if (
        !cover ||
        cover === "占位符"
    ) {
        return DEFAULT_COVER;
    }

    if (
        cover.startsWith("picture/") ||
        cover.startsWith("http://") ||
        cover.startsWith("https://")
    ) {
        return cover;
    }

    return "picture/" + cover;
}

function findSongByTitle(songTitle) {

    return [
        ...(window.playlist || []),
        ...(window.otherSongs || [])
    ].find(
        item =>
            item.title === songTitle
    );
}

/* ==========================
   DOM
========================== */

const audio =
    document.getElementById(
        "audio"
    );

const playBtn =
    document.getElementById(
        "playBtn"
    );

const miniPlayBtn =
    document.getElementById(
        "miniPlayBtn"
    );

const progress =
    document.getElementById(
        "progress"
    );

const progressBar =
    document.querySelector(
        ".progress-bar"
    );

const miniProgress =
    document.getElementById(
        "miniProgress"
    );

const siteFrame =
    document.getElementById(
        "siteFrame"
    );

const miniReleaseBadge =
    document.getElementById(
        "miniReleaseBadge"
    );

let frameScrollTop =
    Number(
        sessionStorage.getItem("donjuan-return-scroll") ||
        0
    );

const returnPage =
    sessionStorage.getItem("donjuan-return-page") ||
    "#page-playlist";

/* ==========================
   初始化
========================== */

function loadSong(songTitle) {

    currentSong =
        findSongByTitle(songTitle);

    lyric =
        window.lyricsData?.find(
            item =>
                item.title === songTitle
        );

    if (!currentSong) {
        document.body.classList.remove(
            "detail-booting"
        );
        return;
    }

    const release =
        typeof getSongReleaseInfo === "function" ?
        getSongReleaseInfo(currentSong.title) :
        null;

    document.body.classList.toggle(
        "is-unreleased-detail",
        !release
    );

    document.body.classList.toggle(
        "is-released-detail",
        Boolean(release)
    );

    miniReleaseBadge.className =
        `release-badge inline ${release?.accent || "draft"}`;

    miniReleaseBadge.setAttribute(
        "aria-label",
        "发行标记"
    );

    miniReleaseBadge.innerText =
        "";

    document.getElementById(
        "song-title"
    ).innerText =
        currentSong.title;

    document.getElementById(
        "miniSongTitle"
    ).innerText =
        currentSong.title;

    document.getElementById(
        "song-duration"
    ).innerText =
        currentSong.duration ||
        "00:00";

    document.getElementById(
        "song-cover"
    ).src =
        getCoverPath(
            currentSong.cover
        );

    audio.src =
        currentSong.audio ||
        TEST_AUDIO;

    audio.currentTime =
        0;

    progress.style.width =
        "0%";

    miniProgress.style.width =
        "0%";

    document.getElementById(
        "lyrics-content"
    ).innerText =
        lyric?.lyrics ||
        "暂无歌词";

    document.getElementById(
        "song-info"
    ).innerText =
        lyric?.info ||
        "暂无 credits";

    document.getElementById(
        "song-note"
    ).innerText =
        lyric?.note ||
        "暂无创作手记";

    document.body.classList.remove(
        "detail-booting"
    );

    startPlayback();
}

if (currentSong) {

    loadSong(
        currentSong.title
    );
}

/* 歌词 */

document.getElementById(
    "lyrics-content"
).innerText =
    lyric?.lyrics ||
    "暂无歌词";

document.getElementById(
    "song-info"
).innerText =
    lyric?.info ||
    "暂无 credits";

document.getElementById(
    "song-note"
).innerText =
    lyric?.note ||
    "暂无创作手记";

siteFrame.addEventListener(
    "load",
    () => {

        let frameUrl;

        try {
            frameUrl =
                new URL(
                    siteFrame.contentWindow.location.href
                );
        } catch (error) {
            return;
        }

        if (
            !frameUrl.pathname.endsWith("detail.html")
        ) {
            injectFrameSongHandler();
            restoreFrameScroll();
            return;
        }

        const nextTitle =
            frameUrl.searchParams.get("title");

        if (!nextTitle)
            return;

        siteFrame.src =
            `index.html${returnPage}`;

        loadSong(nextTitle);
    }
);

function rememberFrameScroll() {

    try {
        frameScrollTop =
            siteFrame.contentWindow.scrollY ||
            siteFrame.contentDocument.documentElement.scrollTop ||
            0;
    } catch (error) {
        frameScrollTop =
            0;
    }
}

function restoreFrameScroll() {

    try {
        if (frameScrollTop) {
            siteFrame.contentWindow.scrollTo(
                0,
                frameScrollTop
            );
        }
    } catch (error) {}
}

window.handleEmbeddedPlaySong =
    title => {

        rememberFrameScroll();
        loadSong(title);
        history.replaceState(
            null,
            "",
            `detail.html?title=${encodeURIComponent(title)}`
        );
        showSongDetail();
    };

window.addEventListener(
    "message",
    event => {
        if (
            event.data?.type !== "donjuan-play-song" ||
            !event.data.title
        ) {
            return;
        }

        rememberFrameScroll();
        loadSong(event.data.title);
        history.replaceState(
            null,
            "",
            `detail.html?title=${encodeURIComponent(event.data.title)}`
        );
        showSongDetail();
    }
);

function injectFrameSongHandler() {

    try {
        const frameDoc =
            siteFrame.contentDocument;

        if (
            !frameDoc ||
            frameDoc.body.dataset.detailIntercepted === "true"
        ) {
            return;
        }

        frameDoc.body.dataset.detailIntercepted =
            "true";

        frameDoc.addEventListener(
            "click",
            event => {

                const link =
                    event.target.closest?.("a[href*='detail.html']");

                const button =
                    event.target.closest?.(".play-btn");

                let nextTitle =
                    "";

                if (link) {
                    const url =
                        new URL(
                            link.href,
                            siteFrame.contentWindow.location.href
                        );

                    nextTitle =
                        url.searchParams.get("title") || "";
                }

                if (!nextTitle && button) {
                    const row =
                        button.closest(".table-row");

                    const titleCell =
                        row?.querySelector(".col-title");

                    nextTitle =
                        button.dataset.title ||
                        row?.dataset.title ||
                        [...(titleCell?.childNodes || [])]
                            .filter(node => node.nodeType === Node.TEXT_NODE)
                            .map(node => node.textContent.trim())
                            .join("")
                            .trim() ||
                        titleCell
                            ?.textContent
                            ?.trim()
                            ?.replace(/\s+/g, " ") ||
                        "";
                }

                if (!nextTitle)
                    return;

                event.preventDefault();
                event.stopPropagation();

                rememberFrameScroll();
                loadSong(nextTitle);
                history.replaceState(
                    null,
                    "",
                    `detail.html?title=${encodeURIComponent(nextTitle)}`
                );
                showSongDetail();
            },
            true
        );
    } catch (error) {}
}

/* ==========================
   播放器
========================== */

function fmt(t) {

    if (isNaN(t))
        return "00:00";

    const m =
        String(
            Math.floor(t / 60)
        ).padStart(2, "0");

    const s =
        String(
            Math.floor(t % 60)
        ).padStart(2, "0");

    return `${m}:${s}`;
}

audio.onloadedmetadata =
    () => {

        document.getElementById(
            "dur"
        ).innerText =
            fmt(audio.duration);
    };

audio.onerror =
    () => {

        if (
            audio.src.endsWith(TEST_AUDIO)
        ) return;

        audio.src =
            TEST_AUDIO;
    };

audio.ontimeupdate =
    () => {

        updateProgress();
    };

function updateProgress() {

        document.getElementById(
            "cur"
        ).innerText =
            fmt(audio.currentTime);

        if (
            audio.duration
        ) {

            const percent =
                audio.currentTime /
                audio.duration *
                100;

            progress.style.width =
                percent + "%";

            miniProgress.style.width =
                percent + "%";
        }
}

function seekByClientX(clientX) {

    if (!audio.duration)
        return;

    const rect =
        progressBar.getBoundingClientRect();

    const ratio =
        Math.min(
            1,
            Math.max(
                0,
                (clientX - rect.left) / rect.width
            )
        );

    audio.currentTime =
        audio.duration * ratio;

    updateProgress();
}

let isSeeking =
    false;

progressBar.addEventListener(
    "pointerdown",
    e => {

        isSeeking =
            true;

        progressBar.setPointerCapture(
            e.pointerId
        );

        seekByClientX(
            e.clientX
        );
    }
);

progressBar.addEventListener(
    "pointermove",
    e => {

        if (!isSeeking)
            return;

        seekByClientX(
            e.clientX
        );
    }
);

progressBar.addEventListener(
    "pointerup",
    e => {

        isSeeking =
            false;

        progressBar.releasePointerCapture(
            e.pointerId
        );
    }
);

progressBar.addEventListener(
    "pointercancel",
    () => {

        isSeeking =
            false;
    }
);

function togglePlay() {

    if (audio.paused) {

        audio.play();

        playBtn.innerText =
            "⏸";

        miniPlayBtn.innerText =
            "⏸";

    } else {

        audio.pause();

        playBtn.innerText =
            "▶";

        miniPlayBtn.innerText =
            "▶";
    }
}

function startPlayback() {

    audio.play()
        .then(() => {
            playBtn.innerText =
                "⏸";

            miniPlayBtn.innerText =
                "⏸";
        })
        .catch(() => {
            playBtn.innerText =
                "▶";

            miniPlayBtn.innerText =
                "▶";
        });
}

playBtn.onclick =
    togglePlay;

miniPlayBtn.onclick =
    togglePlay;

/* ==========================
   返回
========================== */

document.getElementById(
    "backBtn"
).onclick =
    () => {

        sessionStorage.setItem(
            "donjuan-restore-scroll",
            "1"
        );

        sessionStorage.setItem(
            "donjuan-return-scroll",
            String(frameScrollTop || 0)
        );

        location.href =
            `index.html${returnPage}`;
    };

/* ==========================
   tab
========================== */

function switchTabDetail(tab) {

    document
    .querySelectorAll(
        ".tab-content"
    )
    .forEach(
        el =>
            el.classList.remove(
                "active"
            )
    );

    document
    .querySelectorAll(
        ".tab-btn"
    )
    .forEach(
        el =>
            el.classList.remove(
                "active"
            )
    );

    document
    .getElementById(
        "tab-" + tab
    )
    .classList.add(
        "active"
    );

    event.target
    .classList.add(
        "active"
    );
}

function showSongDetail() {
    document.body.classList.remove(
        "is-site-browsing"
    );

    document
        .getElementById("miniPlayer")
        .classList.remove("show");

    siteFrame.src =
        `index.html${returnPage}`;
}

function minimizeToSite() {
    document.body.classList.add(
        "is-site-browsing"
    );

    try {
        const frameUrl =
            new URL(siteFrame.contentWindow.location.href);

        if (
            frameUrl.pathname.endsWith("detail.html") ||
            !frameUrl.hash.includes("page-playlist")
        ) {
            siteFrame.src =
                `index.html${returnPage}`;
        } else {
            restoreFrameScroll();
        }
    } catch (error) {
        siteFrame.src =
            `index.html${returnPage}`;
    }

    document
        .getElementById("miniPlayer")
        .classList.add("show");
}

siteFrame.addEventListener(
    "pointerdown",
    rememberFrameScroll
);

document.getElementById(
    "miniBtn"
).onclick =
    minimizeToSite;

document.getElementById(
    "restorePlayerBtn"
).onclick =
    e => {

        e.stopPropagation();
        showSongDetail();
    };

</script>

</body>
</html>
