<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>唐璜 DonJuan</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="top-header">

    <nav class="top-nav">

        <div class="nav-item active" onclick="switchTab('home')">
            客厅 | 关于唐璜
        </div>

        <div class="nav-item" onclick="switchTab('playlist')">
            地下室
        </div>

        <div class="nav-item" onclick="switchTab('work')">
            餐厅 | 音乐作品
        </div>

        <div class="nav-item" onclick="switchTab('project')">
            厨房 | 音乐企划
        </div>

        <div class="nav-item" onclick="switchTab('private')">
            浴室 | 私人空间
        </div>

        <div class="nav-item" onclick="switchTab('literature')">
            卧室 | 文学作品
        </div>

    </nav>

    <div class="search-box">

        <input
            type="text"
            id="search-input"
            class="search-input"
            placeholder="搜索歌曲..."
            oninput="searchSong()"
        >

        <div
            id="search-result"
            class="search-result"
        ></div>

    </div>

</header>

<!-- 首页 -->
<div id="page-home" class="page active">

    <div class="container home-container">

        <div class="home-main">

            <div class="home-ticker" aria-label="滚动文字">
                <div class="home-ticker-lines">
                    <span>荣耀归于尼禄的海神</span>
                    <span>泰坦尼克在今晨启航</span>
                    <span>甲板上每个人都大吼</span>
                    <span>“你站在哪一边？”</span>
                    <span>荣耀归于尼禄的海神</span>
                </div>
            </div>

            <section class="profile-section">

                <div class="profile-avatar">
                    <img src="picture/zhanweifu.png" alt="头像">
                </div>

                <div class="profile-info">
                    <h1 class="profile-name">唐璜 DonJuan</h1>

                    <div class="profile-bio">
                        <p>
                            我有很多个名字，作为创作者时，我叫唐璜。
                        </p>
                    </div>
                </div>

            </section>

            <hr class="home-divider">

            <section class="worldview-list" id="worldview-list">
            </section>

        </div>

        <!-- 右侧作品栏 -->
        <aside class="home-sidebar">

            <h3 class="sidebar-title">
                已发行作品
            </h3>

            <div class="sidebar-works" id="sidebar-works">
            </div>

        </aside>

    </div>
</div>

<!-- 曲序页 -->
<div id="page-playlist" class="page">

    <div class="container">

        <div class="playlist-table">

            <div class="table-header">

                <div class="col-num">
                    DxV-编号
                </div>

                <div class="col-title">
                    歌曲名
                </div>

                <div class="col-en-title">
                    外文名
                </div>

                <div class="col-creation">
                    创作时间
                </div>

                <div class="col-age">
                    年龄
                </div>

                <div class="col-release">
                    发行时间
                </div>

                <div class="col-style">
                    风格
                </div>

                <div class="col-play">
                    播放
                </div>

                <div class="col-lyrics">
                    歌词详情
                </div>

            </div>

            <div id="playlist-body"></div>

        </div>

    </div>

</div>

<!-- 音乐作品页 -->
<div id="page-work" class="page">

    <div class="container">

        <div class="split-layout">

            <aside class="narrow-sidebar work-filter-sidebar">
                <label class="side-check">
                    <input type="checkbox" class="work-type-filter" value="album">
                    <span>专辑</span>
                </label>

                <label class="side-check">
                    <input type="checkbox" class="work-type-filter" value="ep">
                    <span>EP</span>
                </label>

                <label class="side-check">
                    <input type="checkbox" class="work-type-filter" value="single">
                    <span>单曲</span>
                </label>
            </aside>

            <section class="work-group content-panel">

                <div
                    id="work-list"
                    class="album-list"
                ></div>

            </section>

        </div>

    </div>

</div>

<!-- 音乐企划 -->
<div id="page-project" class="page">

    <div class="container">
        <div class="split-layout">

            <aside class="narrow-sidebar project-filter-sidebar" id="project-filter">
            </aside>

            <section class="project-content content-panel" id="project-content">
            </section>

        </div>
    </div>

</div>

<!-- 私人空间 -->
<div id="page-private" class="page">

    <div class="container">
        <div class="private-layout">

            <section class="friend-feed" id="friend-feed">
            </section>

            <aside class="private-side">
                <div class="calendar-card" id="friend-calendar">
                </div>

                <div class="friend-detail-panel" id="friend-detail-panel">
                    <div class="friend-detail-header">
                        <h3 id="friend-detail-title">动态</h3>
                        <button onclick="closeFriendDetail()">×</button>
                    </div>

                    <div class="friend-detail-body" id="friend-detail-body">
                    </div>
                </div>
            </aside>

        </div>
    </div>

</div>

<!-- 文学作品 -->
<div id="page-literature" class="page">

    <div class="container">
        <div id="literature-list"></div>
    </div>

</div>

<!-- 歌词侧栏 -->
<div id="lyrics-sidebar" class="lyrics-sidebar">

    <div class="lyrics-header">

        <h3 id="lyrics-title">
            歌词
        </h3>

        <button onclick="closeLyricsSidebar()">
            ×
        </button>

    </div>

    <div
        class="lyrics-body"
        id="lyrics-body"
    ></div>

</div>

<!-- 数据 -->
<script src="js/longzu.js"></script>
<script src="js/subway.js"></script>
<script src="js/playlist.js"></script>
<script src="js/other.js"></script>
<script src="js/lyrics.js"></script>
<script src="js/album.js"></script>
<script src="js/worldview.js"></script>
<script src="js/project.js"></script>
<script src="js/friend.js"></script>

<!-- 主脚本 -->
<script src="script.js"></script>

</body>
</html>
